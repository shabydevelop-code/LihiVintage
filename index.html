<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lihi Vintage</title>
    <meta name="description" content="גלו פריטי וינטג' ובלעדיים בליהי וינטג'. קולקציות שנבחרו בקפידה לנשים וגברים.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header (Populated by JS) -->
    <header></header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>אלגנטיות על-זמנית</h1>
            <p>פריטי וינטג' שנבחרו בקפידה ומספרים סיפור. גלו את הפריט האהוב הבא שלכם.</p>
            <a href="#shop" class="btn-primary">לקולקציה</a>
        </div>
    </section>

    <!-- Main Content -->
    <main class="container" id="shop">
        
        <!-- Category Filters -->
        <div class="filters" role="group" aria-label="Product categories">
            <button class="filter-btn active" data-sub="all" aria-pressed="true">הכל</button>
            <button class="filter-btn" data-sub="tops" aria-pressed="false">חולצות</button>
            <button class="filter-btn" data-sub="bottoms" aria-pressed="false">מכנסיים</button>
            <button class="filter-btn" data-sub="outerwear" aria-pressed="false">מעילים</button>
        </div>

        <!-- Product Grid -->
        <div class="products-grid" id="productsGrid" aria-label="Products display">
            <!-- Products will be injected here by JavaScript -->
        </div>

    </main>

    <!-- Cart Drawer -->
    <div class="cart-overlay" id="cartOverlay" role="dialog" aria-modal="true" aria-labelledby="cartHeading">
        <div class="cart-drawer">
            <div class="cart-header">
                <h2 class="serif" id="cartHeading">סל הקניות שלך</h2>
                <button class="close-cart" id="closeCart" aria-label="סגירת עגלת הקניות">
                    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                </button>
            </div>
            
            <div class="cart-items" id="cartItems" aria-live="polite">
                <!-- Cart items will be injected here -->
                <p style="text-align: center; color: var(--text-muted); margin-top: 2rem;">הסל שלכם ריק.</p>
            </div>

            <div class="cart-footer">
                <div class="cart-total">
                    <span>סה"כ</span>
                    <span id="cartTotal">₪0.00</span>
                </div>
                <button class="btn-checkout" id="checkoutBtn">המשך לפרטי הזמנה</button>
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div class="modal-overlay" id="checkoutModal" role="dialog" aria-modal="true" aria-labelledby="checkoutHeading">
        <div class="modal">
            <div class="modal-header">
                <button class="close-cart" id="closeModal" aria-label="סגירת פרטי הזמנה">
                    <i class="fa-solid fa-xmark" aria-hidden="true"></i>
                </button>
                <h2 class="serif" id="checkoutHeading">פרטי הזמנה</h2>
            </div>
            
            <form id="checkoutForm">
                <div class="modal-body">
                    <div class="payment-info">
                        <i class="fa-solid fa-info-circle"></i>
                        שימו לב: התשלום מתבצע באמצעות אפליקציית <strong>Bit</strong>. אנו ניצור עמכם קשר עם הנחיות מדויקות לאחר סיום הרכישה.
                    </div>
                    <div class="form-group">
                        <label for="fullName">שם מלא</label>
                        <input type="text" id="fullName" required placeholder="הזינו את שמכם המלא">
                    </div>
                    <div class="form-group">
                        <label for="phone">מספר טלפון</label>
                        <input type="tel" id="phone" required placeholder="למשל: 052-1234567">
                    </div>
                    <div class="form-group">
                        <label for="orderNotes">הערות להזמנה (אופציונלי)</label>
                        <textarea id="orderNotes" rows="2" placeholder="בקשות מיוחדות, אריזת מתנה וכו'"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="submit" class="btn btn-primary" style="width: 100%;">שליחת בקשת רכישה בוואטסאפ</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Footer (Populated by JS) -->
    <footer></footer>

    <!-- Mobile Nav Overlay (Populated by JS) -->
    <div class="mobile-nav-overlay" id="mobileNavOverlay"></div>

    <!-- Scripts -->
    <script src="shared-components.js"></script>
    <script src="products.js"></script>
    <script src="script.js"></script>
    <script src="accessibility-bar.js"></script>
</body>
</html>
